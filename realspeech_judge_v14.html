          <h2>3. 언어</h2>
          <h3>3-1. 평가 정의</h3>

            언어는 발표자가 영어를 정확하고 유창하게 발화하는가를 평가하는 영역이다.
            이 영역은 주로 음성 중심 평가이며 발음, 억양, 유창성, 의미 전달을 방해하지 않는 수준의 정확성,
            그리고 전체적인 이해 가능성을 포함한다. 의미를 살리기 위한 속도·멈춤·강조의 조절(완급)은 이 영역이 아니라 전달(Ⅲ)에서 본다.
          </p>

            단, 여기서의 이해 가능성은 주로 <strong>발음·억양·문장 오류 등 언어 표현으로 인해 문장 의미가 들리고 이해되는가</strong>를 중심으로 본다.
          </div>

              <tr><td>정확성</td><td>어휘와 문장을 정확하게 사용하여 의미를 분명하게 전달하는가</td></tr>
            </tbody>

          <div class=&quot;score-card&quot;>

            <div class=&quot;score-box&quot;><strong>3점</strong><div>일부 부자연스러운 발음, 억양, 끊김 또는 오류가 있으나 전체적으로 메시지 이해에 큰 어려움이 없다.</div></div>
            <div class=&quot;score-box&quot;><strong>2점</strong><div>발음, 억양, 끊김, 문장 오류 등이 다소 반복되어 청중이 내용을 이해하는 데 어려움이 있다.</div></div>
            <div class=&quot;score-box&quot;><strong>1점</strong><div>발화 흐름이 매우 불안정하거나 발음·문장 오류가 많아 메시지 이해가 어렵다.</div></div>
          </div>

          <h3>3-4. 심사 시 유의사항</h3>
          <ul>
            <li>언어 영역은 발음·억양·유창성·정확성을 분명한 기준으로 평가한다. 원어민 수준을 요구하지는 않되, 의미가 정확하고 자연스럽게 전달되는지를 냉정하게 본다.</li>
            <li>문법 오류가 있더라도 의미가 명확하면 큰 감점 요인으로 보지 않는다.</li>
            <li>지나치게 빠르게 말해 발음이 뭉개지고 흘려져 알아듣기 어려우면 높은 유창성으로 보지 않는다. 다만 발음은 또렷이 들리지만 끊어 읽기·완급이 없어 이해가 어려운 경우는 이 영역이 아니라 전달(Ⅲ)에서 본다.</li>
            <li>천천히 말하더라도 의미 단위가 명확하고 안정적이면 긍정적으로 평가할 수 있다.</li>
            <li>영어 난이도가 높다는 이유만으로 높은 점수를 주지 않는다.</li>
            <li>발음·억양이 또렷해도 발표 내용이 학년 수준에 맞는지(너무 쉽거나 어렵지 않은지)는 이 영역이 아니라 내용(Ⅱ)에서 본다.</li>
            <li>속도·멈춤·강조의 경계: 발음·억양이 뭉개져 <strong>안 들리는 수준</strong>의 문제는 언어(Ⅰ)에서, <strong>다 들리는데</strong> 의미를 살리는 완급·멈춤·강조가 부족한 경우는 전달(Ⅲ)에서 본다.</li>
          </ul>
        </section>

        <section class=&quot;section&quot; id=&quot;delivery&quot;>
          <h2>4. 내용</h2>
          <h3>4-1. 평가 정의</h3>
          <p>
            내용은 발표자가 <strong>내용을 논리적으로 구성하고, 자신의 생각을 분명하게 표현하는가</strong>를 평가하는 영역이다.
            내용의 학년 수준 적합성, 주제 이해, 논리적 내용 구성, 발표자 자신의 생각·경험·이유, 메시지의 분명함을 본다.
          </p>
          <p>
            이 영역은 발표 내용 자체의 완성도를 본다.
            정보형, 경험형, 주장형, 창의적 스토리형 등 주제의 성격이 다르더라도, 발표 목적에 맞게 메시지가 분명하게 조직되고 발표자의 관점이 담겨 있는지를 본다.
            내용을 충분히 소화해 능숙하게 표현하는 정도(능숙한 전달)와 속도·멈춤·강조의 조절(완급)은 전달 행위에 해당하므로 전달(Ⅲ)에서 평가한다.
          </p>

          <h3>4-2. 내용의 학년 수준 적합성</h3>
          <p>
            발표 내용이 발표자의 학년 수준에 맞는지를 본다. 아이들은 원고를 작성하고 다듬어 준비하므로, 그 내용이 <strong>너무 쉽지도 너무 어렵지도 않게 학년 수준에 적절한가</strong>를 평가한다.
          </p>
          <ul>
            <li>학년 수준에 비해 지나치게 단순한 내용·문장만 반복되어 발표의 밀도가 떨어지지 않는가(예: 중등이 초저학년 수준 문장만 사용)</li>
            <li>내용의 깊이와 표현이 발표자의 학년에 자연스럽게 어울리는가</li>
          </ul>
          <div class=&quot;note&quot;>
            학년 수준보다 지나치게 단순한 경우(밀도 부족)는 내용 평가에서 최고 수준을 신중하게 판단한다.
            반대로 학년 수준보다 어려운 내용을 다룬 경우, 내용의 난이도 자체는 감점 요인이 아니다. 그 어려운 내용을 정확하고 유창하게 발화하는지는 언어(Ⅰ)에서, 충분히 소화해 능숙하게 전달하는지는 전달(Ⅲ)에서 판단한다.
          </div>

          <h3>4-3. 주제 이해와 내용 구조</h3>
          <p>
            발표 내용이 청중이 따라가기 쉽도록 논리적인 구조로 전개되는지를 평가한다.
            정보형 발표라면 설명 순서가 명확해야 하고, 경험형 발표라면 사건이나 감정의 흐름이 자연스러워야 한다.
            주장형 발표라면 주장과 근거의 연결이 분명해야 하며, 창의적 스토리형 발표라면 이야기의 전개가 이해 가능해야 한다.
          </p>
          <ul>
            <li>시작, 중간, 끝의 흐름이 있는가</li>
            <li>핵심 메시지가 분명한가</li>
            <li>내용이 중간에 갑자기 끊기거나 튀지 않는가</li>
            <li>발표 유형에 맞는 전개 방식이 있는가</li>
            <li>청중이 “무슨 말을 하고 싶은지” 이해할 수 있는가</li>
          </ul>

          <h3>4-4. 내용에 담긴 발표자 자신의 생각</h3>
          <p>
            발표 <strong>내용 자체</strong>에 발표자 자신의 생각·의견·이유·경험·느낌이 담겨 있는지를 본다.
            이는 잘 정리된 정보를 나열하는 데 그치기보다, 발표자가 자신의 관점을 표현하도록 장려하기 위한 내용 평가 기준이다.
          </p>
          <ul>
            <li>왜 이 주제를 선택했는지, 자신과 어떤 관련이 있는지가 드러나는가</li>
            <li>자신의 경험·예시·느낌·평가·이유가 구체적으로 담겨 있는가</li>
            <li>단순 정보·사실 나열에 그치지 않고 발표자의 관점이 보이는가</li>
          </ul>
          <div class=&quot;note&quot;>
            <strong>정보형 발표는 완충하여 적용한다.</strong> 의견이 어색한 정보 주제라면, 의견·주장을 요구하기보다 그 주제를 고른 이유, 자신의 경험·관심과의 연결, 알게 된 점에 대한 느낌이 드러나는 정도로 인정한다.
            “나는 ~라고 생각합니다”를 형식적으로 끼워 넣은 것은 가점 요인이 아니며, 그 생각이 발표 내용과 자연스럽게 연결되고 구체적인지를 본다.
            핵심은 의견 문장의 유무가 아니라, 발표 내용에 발표자 자신의 관점이 자연스럽고 구체적으로 담겨 있는지이다.
          </div>

          <h3>4-5. 청중 이해 용이성</h3>
          <p>
            청중이 발표 내용을 편안하게 따라가고 이해할 수 있는지를 평가한다.
            심사위원은 발표의 청중이라고 가정하고, 발표자가 자신의 메시지를 명확히 전달하고 있는지를 본다.
            단, 이 항목은 발음 자체의 명확성보다 <strong>내용 구조, 흐름, 핵심 메시지가 잘 조직되어 청중이 발표의 의미를 따라갈 수 있는가</strong>를 중심으로 판단한다.
          </p>
          <ul>
            <li>발표의 핵심 메시지가 분명하게 남는가</li>
            <li>청중이 큰 노력 없이 내용의 구조와 핵심 메시지를 따라갈 수 있는가</li>
            <li>정보, 경험, 주장, 이야기의 목적이 잘 전달되는가</li>
            <li>발표가 끝났을 때 무엇을 말했는지 설명할 수 있는가</li>
          </ul>

          <h3>4-6. 4점 척도</h3>
          <div class=&quot;score-card&quot;>
            <div class=&quot;score-box&quot;><strong>4점</strong><div>주제가 학년 수준에 적절하고 내용 흐름이 자연스러우며, 자기 생각·경험·이유가 구체적으로 담겨 있다. 무엇을 말하고 싶은지 분명하게 전달된다.</div></div>
            <div class=&quot;score-box&quot;><strong>3점</strong><div>전체 흐름은 안정적이고 핵심 메시지도 대체로 분명하나, 자기 생각이나 구체성이 일부 부족하다.</div></div>
            <div class=&quot;score-box&quot;><strong>2점</strong><div>내용 흐름이 다소 끊기거나 핵심 메시지가 약해 청중이 발표의 의도를 부분적으로만 이해할 수 있다.</div></div>
            <div class=&quot;score-box&quot;><strong>1점</strong><div>내용의 순서나 핵심이 분명하지 않아 무엇을 말하려는지 이해하기 어렵다.</div></div>
          </div>

          <h3>4-7. 심사 시 유의사항</h3>
          <ul>
            <li>원고의 수준이나 문장 난이도만으로 판단하지 않는다.</li>
            <li>내용이 학년 수준에 맞는지를 본다. 너무 쉬워 밀도가 떨어지면 높은 평가를 받기 어렵다. 학년 수준보다 어려운 내용은 난이도 자체로 감점하지 않으며, 정확·유창한 발화는 언어(Ⅰ), 소화·전달의 능숙함은 전달(Ⅲ)에서 판단한다.</li>
            <li>정보형 발표와 경험형 발표를 같은 방식으로 비교하지 않고, 유형별 목적에 맞게 내용이 완성되었는지를 본다.</li>
            <li>짧은 발표라도 메시지가 분명하면 좋은 평가를 받을 수 있고, 긴 발표라도 핵심이 흐릿하면 높은 평가를 받기 어렵다.</li>
            <li>내용에 발표자 자신의 생각·이유·경험이 담겨 있으면 긍정적으로 본다. 단 정보형은 주제 선택 이유·경험과의 연결·느낌으로 완충하여 적용한다.</li>
            <li>“나는 ~라고 생각합니다”처럼 형식적으로 끼워 넣은 의견은 가점 요인이 아니다. 생각이 발표 내용과 자연스럽게 연결되고 구체적인지를 본다.</li>
            <li>내용을 충분히 소화해 능숙하게 표현하는 정도(능숙한 전달)는 이 영역이 아니라 전달(Ⅲ)에서 평가한다.</li>
          </ul>
        </section>

        <section class=&quot;section&quot; id=&quot;performance&quot;>
          <h2>5. 전달</h2>
          <h3>5-1. 평가 정의</h3>
          <p>
            전달은 발표자가 <strong>자신감 있는 목소리와 자연스러운 태도로 효과적으로 전달하는가</strong>를 평가하는 영역이다.
            시선·표정·자세·제스처·목소리 같은 시각적·태도적 표현과 함께, 내용을 충분히 소화해 <strong>능숙하게 표현하는가(능숙한 전달)</strong>와 속도·멈춤·강조의 조절(완급)을 본다.
            이 요소들이 안정적으로 어우러질 때 발표자의 자신감과 몰입감이 드러난다.
          </p>
          <table>
            <thead>
              <tr><th>요소</th><th>평가 관점</th></tr>
            </thead>
            <tbody>
              <tr><td>시선 처리</td><td>카메라 또는 청중을 의식하며 안정적으로 시선을 유지하는가</td></tr>
              <tr><td>표정·자세</td><td>발표 내용에 어울리는 자연스러운 표정과 안정적인 자세를 보이는가</td></tr>
              <tr><td>제스처</td><td>손짓 등으로 내용을 자연스럽게 살리는가(적정 수준 — 너무 많으면 산만하고, 전혀 없이 경직되면 전달력이 떨어진다)</td></tr>
              <tr><td>목소리</td><td>성량과 또렷함이 안정적인가</td></tr>
              <tr><td>능숙한 전달</td><td>원고를 눈으로 읽거나 책 읽듯 말하지 않고, 내용을 충분히 소화해 능숙하고 자신 있게 표현하는가</td></tr>
              <tr><td>완급(속도·멈춤·강조)</td><td>의미를 살리기 위해 속도를 조절하고, 핵심에서 멈추거나 강조하는가</td></tr>
              <tr><td>발표 완수</td><td>중단 없이 끝까지 발표를 마무리하는가</td></tr>
            </tbody>
          </table>
          <div class=&quot;note&quot;>
            <strong>능숙한 전달은 영어 실력(유창성)이 아니라 발표를 얼마나 소화해 익혔는가를 본다.</strong>
            영어 구사가 매끄러운가(유창성)는 언어(Ⅰ)에서 보고, 이 항목은 내용을 충분히 연습·소화해 외워 읽는 티 없이 능숙하게 끌고 가는지를 본다.
            그래서 영어는 다소 더듬어도 발표를 능숙하게 소화한 경우(Ⅰ 낮고 Ⅲ 높음)와, 영어는 유창하지만 책 읽듯 평탄하게 흘리는 경우(Ⅰ 높고 Ⅲ 낮음)가 모두 가능하다.
            <strong>끊김의 경계</strong> — 영어 단어·표현이 안 떠올라 끊기면 언어(Ⅰ), 다음 흐름을 잊어 멍하니 멈추거나 더듬으면 능숙한 전달(Ⅲ)에서 본다.
            완급은 소리가 충분히 들린다는 전제에서 의미를 살리기 위해 어디를 늦추고 멈추고 강조했는가를 본다.
          </div>

          <h3>5-2. 4점 척도</h3>
          <div class=&quot;score-card&quot;>
            <div class=&quot;score-box&quot;><strong>4점</strong><div>시선, 표정, 자세, 목소리가 안정적이며, 내용을 충분히 소화해 능숙하고 자신 있게 표현한다. 중요한 대목에서 속도·멈춤·강조가 살아 발표 몰입감이 높다.</div></div>
            <div class=&quot;score-box&quot;><strong>3점</strong><div>전반적으로 안정적으로 발표하나, 일부 시선·표정·제스처나 속도 조절이 어색하다.</div></div>
            <div class=&quot;score-box&quot;><strong>2점</strong><div>긴장하거나 원고를 읽는 느낌이 뚜렷해 발표 몰입이 약하고, 소화해 능숙하게 표현하는 느낌이 부족하다.</div></div>
            <div class=&quot;score-box&quot;><strong>1점</strong><div>시선, 자세, 목소리, 발표 흐름이 매우 불안정하여 청중이 발표에 몰입하기 어렵다.</div></div>
          </div>

          <h3>5-3. 심사 시 유의사항</h3>
          <ul>
            <li>제스처는 적정 수준을 본다. 너무 많으면 산만하고, 손짓 없이 경직된 자세로만 발표하면 전달력이 떨어진다. 다만 화면·긴장 등 영상 환경상 제스처가 적은 것을 과도하게 감점하지는 않는다.</li>
            <li>수줍음이 많은 학생이라도 끝까지 안정적으로 발표하면 좋은 평가를 받을 수 있다.</li>
            <li>지나친 연출보다 발표 내용에 어울리는 자연스러운 수행을 중시한다.</li>
            <li>능숙한 전달은 원고를 눈으로 읽거나 책 읽듯 말하기보다, 내용을 충분히 소화해 능숙하게 표현하는 발표를 더 긍정적으로 본다.</li>
            <li>완급의 경계: 발음·억양이 뭉개져 안 들리는 수준은 언어(Ⅰ)에서, 다 들리는데 의미를 살리는 속도·멈춤·강조가 부족하면 이 영역(Ⅲ)에서 본다.</li>
            <li>발표를 끝까지 마무리하지 못한 경우 발표 완수 측면에서 감점 사유가 된다. 제출된 녹화영상의 뒷부분이 잘려 발표가 마무리되지 않은 채 끝나는 경우도 발표가 완수되지 않은 것으로 보아 감점할 수 있다.</li>
          </ul>
        </section>

        <section class=&quot;section&quot; id=&quot;types&quot;>
          <h2>6. 발표 유형별 평가 가이드</h2>
          <p>
            리얼스피치에는 다양한 유형의 발표가 제출될 수 있다.
            심사위원은 발표 유형의 차이를 고려하되, 특정 유형이 유리하거나 불리해지지 않도록 발표 목적에 맞는 내용를 중심으로 평가한다.
          </p>

          <h3>6-1. 정보 설명형 발표</h3>
          <p><strong>예시:</strong> 과학 개념 설명, 환경 문제 소개, 요리 방법 설명, 역사적 사건 소개, AI·기술 소개</p>
          <ul>
            <li>설명 순서가 명확한가</li>
            <li>핵심 정보가 이해하기 쉽게 전달되는가</li>
            <li>어려운 개념을 청중이 따라갈 수 있게 말하는가</li>
            <li>중요한 부분에서 속도와 강조를 조절하는가</li>
            <li>사실이나 절차가 크게 혼동되지 않는가</li>
          </ul>
          <div class=&quot;note&quot;>정보가 많다고 반드시 좋은 발표는 아니다. 청중이 이해할 수 있도록 구조화하여 전달하는지가 중요하다.</div>

          <h3>6-2. 경험 공유형 발표</h3>
          <p><strong>예시:</strong> 내가 좋아하는 과목, 기억에 남는 여행, 나의 꿈, 실패하거나 도전했던 경험, 가족·친구·학교생활 이야기</p>
          <ul>
            <li>자신의 생각이나 감정이 자연스럽게 드러나는가</li>
            <li>경험의 흐름이 이해 가능하게 전달되는가</li>
            <li>쉬운 표현이라도 자기 말처럼 말하는가</li>
            <li>청중이 발표자의 메시지에 공감할 수 있는가</li>
            <li>발표가 진솔하고 자연스럽게 느껴지는가</li>
          </ul>
          <div class=&quot;note&quot;>경험형 발표는 화려한 문장보다 내용을 소화한 능숙한 전달이 중요하다. 쉬운 문장을 사용하더라도 메시지가 분명하고 자연스럽다면 좋은 평가를 받을 수 있다.</div>

          <h3>6-3. 주장·설득형 발표</h3>
          <p><strong>예시:</strong> 스마트폰 사용에 대한 의견, 환경 보호를 해야 하는 이유, 학교생활 개선 제안, 내가 생각하는 좋은 친구, AI 활용에 대한 의견</p>
          <ul>
            <li>주장이 분명한가</li>
            <li>근거나 예시가 자연스럽게 연결되는가</li>
            <li>청중을 설득하려는 의도가 전달되는가</li>
            <li>강조와 멈춤이 설득 포인트에 맞게 사용되는가</li>
            <li>결론이 분명한가</li>
          </ul>
          <div class=&quot;note&quot;>주장의 수준보다 발표자의 생각이 일관성 있게 전달되는지를 본다.</div>

          <h3>6-4. 창의적 스토리형 발표</h3>
          <p><strong>예시:</strong> 상상 이야기, 미래의 나, 내가 만든 캐릭터 이야기, 판타지 상황 설명, 창작 스토리</p>
          <ul>
            <li>이야기의 흐름이 이해 가능한가</li>
            <li>장면이나 사건 전개가 자연스럽게 이어지는가</li>
            <li>이야기의 감정을 발표자가 직접 느끼며 전달하는가(슬픈 장면에서 톤이 가라앉고, 신나는 장면에서 표정이 살고, 반전에서 멈춤을 주는가)</li>
            <li>이야기를 ‘읽는’ 느낌이 아니라 ‘들려주는’ 느낌으로, 발표자가 화자로서 이야기 안에 있는가</li>
            <li>표정, 억양, 멈춤이 이야기 분위기와 어울리는가</li>
            <li>청중이 이야기의 핵심을 따라갈 수 있는가</li>
          </ul>
          <div class=&quot;note&quot;>
            <strong>창의 스토리형에서 중요한 것은 이야기를 충분히 소화해 들려주는가이다.</strong>
            지어낸 이야기라도 발표자가 그 감정을 느끼며 능숙하게 들려주면 잘 소화된 것이고, 잘 쓰인 문장을 감정선과 무관하게 평탄히 읽어 내려가면 소화가 약한 것이다.
            창작 측면(소재·설정에 발표자다운 선택이나 자기가 좋아하는 것이 녹아 있는지)도 참고하되, 핵심은 이야기를 능숙하게 소화해 전달하는가이다.
            전하고 싶은 느낌·메시지가 드러나면 긍정 요소이나, 없다고 감점하지는 않는다.
          </div>
          <div class=&quot;note warn&quot;>창의성 자체를 별도 우열로 평가하지 않는다. 소재가 독특하다는 이유만으로 높은 점수를 주지 않으며, 평범한 소재라도 자연스럽고 몰입감 있게 전달하면 좋은 평가를 받을 수 있다.</div>
        </section>

        <section class=&quot;section&quot; id=&quot;principles&quot;>
          <h2>7. 심사위원 공통 판단 원칙</h2>
          <h3>7-1. 영어 난이도와 발표 완성도를 분리한다</h3>
          <p>
            어려운 어휘와 문장을 많이 사용한 발표가 반드시 더 우수한 것은 아니다.
            중요한 것은 참가자의 수준에서 내용을 얼마나 정확하고 유창하게 발화하며, 자연스럽고 효과적으로 전달했는가이다.
            (학년 수준에 비추어 표현이 지나치게 단순한 경우의 판단은 7-6에서 다룬다.)
          </p>

          <h3>7-2. 긴 발표가 항상 유리하지는 않다</h3>
          <p>
            2분 30초 발표가 1분 발표보다 자동으로 높은 점수를 받는 것은 아니다.
            발표 시간이 길더라도 구조가 불안정하거나 암기 느낌이 강하면 높은 평가를 받기 어렵다.
            반대로 1분 발표라도 메시지가 분명하고 자연스럽게 전달되면 좋은 평가를 받을 수 있다.
          </p>

          <h3>7-3. 창의성보다 소화된 전달을 중시한다</h3>
          <p>
            창의적인 원고나 독특한 소재는 긍정적 요소가 될 수 있으나, 그 자체가 고득점의 근거가 되어서는 안 된다.
            심사에서는 발표자가 내용을 이해하고 말하는가, 자기 말처럼 자연스럽게 전달하는가,
            청중이 메시지를 이해할 수 있는가, 원고 수준과 발표 수행이 어울리는가를 더 중요하게 본다.
          </p>

          <h3>7-4. 문법 오류는 의미 전달 방해 여부를 중심으로 판단한다</h3>
          <p>
            문법이나 어휘 오류가 있더라도 의미 전달에 큰 지장이 없다면 과도하게 감점하지 않는다.
            다만 오류가 반복되어 청중이 내용을 이해하기 어렵거나 핵심 메시지가 혼동된다면 언어에서 감점할 수 있다.
          </p>

          <h3>7-5. 단순 암기 여부를 직접 판단하지 않는다</h3>
          <p>
            심사위원은 학생이 실제로 원고를 직접 썼는지, 얼마나 외웠는지를 정확히 알 수 없다.
            따라서 추측으로 평가하지 않고, 의미 단위 전달, 속도 조절·멈춤·강조, 기계적 암송 느낌, 실수 후 회복, 자연스러운 전달 여부 같은 관찰 가능한 요소를 기준으로 판단한다.
            시선 처리는 전달 영역에서 별도로 판단하며, 내용에서 중복 감점하지 않는다.
          </p>

          <h3>7-6. 참가자 수준에 맞는 표현 적절성도 함께 본다</h3>
          <p>
            심사에서는 어려운 영어 자체를 가산점으로 보지 않는다.
            그러나 참가자의 학년과 발달 수준에 비추어 표현 수준이 지나치게 낮아, 내용 전개와 표현의 폭이 과도하게 제한되는 경우에는 최고 수준 평가를 신중하게 판단한다.
          </p>
          <p>
            즉, 심사에서는 영어 난이도 자체보다 <strong>참가자의 수준에 맞는 적절한 표현 선택과 내용</strong>를 함께 본다.
            쉬운 영어를 사용했더라도 학년 수준에 맞게 메시지가 충분히 전개되고 자연스럽게 전달되면 좋은 평가를 받을 수 있지만,
            지나치게 단순한 표현만 반복되어 발표의 밀도와 전개가 제한된다면 최고 수준 평가는 어렵다.
          </p>
        </section>

        <section class=&quot;section&quot; id=&quot;faq&quot;>
          <h2>8. 곤란한 사례별 FAQ</h2>

          <div class=&quot;faq-item&quot;>
            <h4>Q1. 어려운 단어와 문장을 많이 사용하여 2분 30초 동안 발표한 학생과, 쉬운 문장으로 1분 동안 자연스럽게 발표한 학생은 어떻게 비교하나요?</h4>
            <p>
              두 발표는 영어 난이도와 발표 완성도를 분리해서 평가해야 한다. 어려운 단어와 문장을 사용했더라도,
              그 표현이 정확하고 자연스럽게 발화되어 의미 전달에 실제로 도움이 되는 경우에만 긍정적으로 볼 수 있다.
              다만 어휘나 문장의 난이도 자체가 가산점이 되는 것은 아니다.
              발표가 기계적이거나 암기 느낌이 강하고, 청중이 이해하기 어렵다면 높은 점수를 받기 어렵다.
              반대로 쉬운 문장으로 1분 동안 발표했더라도 자기 생각이 분명하고 자연스럽게 전달되며
              청중이 메시지를 쉽게 이해할 수 있다면 좋은 평가를 받을 수 있다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q2. 정보성 발표와 경험 이야기 발표는 어떻게 공정하게 비교하나요? 예를 들어, 과학 개념을 설명한 발표와 여행 경험을 이야기한 발표는 어떻게 보나요?</h4>
            <p>
              두 발표는 발표 목적이 다르므로, 같은 소재 기준으로 비교하지 않고 <strong>각 발표가 자기 목적에 맞게 얼마나 완성도 있게 전달되었는가</strong>를 중심으로 평가한다.
            </p>
            <p>
              정보성 발표는 설명 구조, 핵심 정보의 명확성, 청중이 내용을 따라가기 쉬운 전달 방식이 중요하다.
              반면 경험 이야기 발표는 경험의 흐름, 소화된 능숙한 표현, 생각이나 감정이 자연스럽게 전달되는지가 중요하다.
            </p>
            <p>
              따라서 과학 설명 발표가 더 지적이거나, 여행 경험 발표가 더 감성적이라는 이유만으로 자동으로 높은 점수를 주지 않는다.
              두 발표 모두 각자의 목적에 맞게 메시지를 얼마나 잘 전달했는지를 기준으로 평가한다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q3. 창의적인 스토리를 발표한 학생이 더 유리한가요?</h4>
            <p>
              반드시 그렇지 않다. 창의적인 소재는 발표를 흥미롭게 만들 수 있지만, 창의성 자체를 별도 우열 기준으로 평가하지 않는다.
              중요한 것은 그 이야기를 청중이 이해할 수 있도록 자연스럽게 전달했는가이다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q4. 원고를 누가 써준 것 같은 발표는 어떻게 평가하나요?</h4>
            <p>
              심사위원은 원고 작성 과정이나 외부 도움 여부를 정확히 알 수 없다. 따라서 추측으로 감점해서는 안 된다.
              대신 원고 수준에 비해 발표가 지나치게 부자연스러운가, 문장의 의미를 이해하지 못한 듯 기계적으로 말하는가,
              속도 조절·멈춤·강조가 내용과 맞지 않는가, 실수 후 회복하지 못하는가, 청중에게 메시지가 자연스럽게 전달되는가를 기준으로 평가한다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q5. 발표 시간이 짧으면 불리한가요?</h4>
            <p>
              발표 시간이 규정 범위 안에 있다면 짧다는 이유만으로 낮은 점수를 주지 않는다.
              짧은 발표라도 핵심 메시지가 분명하고 자연스럽고 안정적으로 전달되면 좋은 평가를 받을 수 있다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q6. 긴 발표는 더 높은 점수를 받아야 하나요?</h4>
            <p>
              아니다. 긴 발표는 더 많은 내용을 담을 수 있다는 장점이 있지만, 그만큼 구조와 전달 조절이 중요하다.
              핵심 메시지가 불분명하거나, 문장이 길고 복잡하지만 청중 이해가 어렵거나, 속도 조절과 멈춤 조절 없이 계속 말하는 경우 높은 점수를 받기 어렵다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q7. 쉬운 영어를 사용한 발표도 높은 점수를 받을 수 있나요?</h4>
            <p>
              네, 받을 수 있다. 리얼스피치는 어려운 영어를 과시하는 대회가 아니라, 영어로 자신의 메시지를 전달하는 대회이다.
              따라서 쉬운 문장을 사용하더라도 메시지가 분명하고, 자기 생각이나 경험이 자연스럽게 드러나며, 발음과 흐름이 정확하고 유창하며,
              청중이 이해하기 쉽다면 좋은 평가를 받을 수 있다.
            </p>
            <p>
              다만 여기서 중요한 것은 <strong>자기 학년과 발달 수준에 비추어 표현 수준이 적절한가</strong>이다.
              예를 들어 중등 참가자가 초저 수준의 매우 짧고 단순한 문장만으로 발표하여 내용 전개와 표현의 폭이 지나치게 제한된다면,
              단순히 유창하다는 이유만으로 최고 수준 평가를 받기는 어렵다.
            </p>
            <p>
              반대로 학년 수준보다 어려운 영어를 사용한 것 자체는 감점 요인이 아니다.
              그 표현을 정확하고 유창하게 발화하는지는 언어 영역에서, 충분히 소화해 자연스럽게 전달하는지는 전달 영역에서 판단한다.
              즉, 심사에서는 학년 대비 낮은 표현 수준은 내용 평가에서 신중하게 보되, 높은 수준은 언어·전달 영역에서 판단한다.
            </p>
            <p>
              심사위원은 이런 판단을 할 때 문장 난이도만 따로 점수화하기보다, <strong>학년군별 표현 수준 앵커</strong>를 참고하여
              해당 발표가 자기 수준에 맞는 언어로 충분한 내용을 전개하고 있는지 함께 살핀다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q8. 문법 오류가 있는 발표는 많이 감점해야 하나요?</h4>
            <p>
              문법 오류는 의미 전달을 방해하는 정도에 따라 판단한다. 사소한 오류가 있어도 청중이 내용을 이해하는 데 문제가 없다면 과도하게 감점하지 않는다.
              그러나 오류가 반복되어 핵심 메시지가 혼동되거나 문장 의미를 이해하기 어렵다면 언어에서 감점할 수 있다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q9. 암기한 발표와 소화한 발표는 어떻게 구분하나요?</h4>
            <p>
              모든 발표는 어느 정도 준비와 암기를 포함할 수 있다. 중요한 것은 암기한 내용을 얼마나 자연스럽게 전달하느냐이다.
              소화한 발표는 문장과 문장이 자연스럽게 이어지고, 의미 있는 단위로 끊어 말하며, 중요한 부분에서 속도와 강조를 조절하고,
              실수가 있어도 자연스럽게 회복하며, 표정과 목소리가 내용과 어울리고, 청중에게 말하고 있다는 느낌이 있다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q10. 스크립트를 보면서 말하듯이 자연스럽게 읽는 경우와, 외워서 말하지만 버벅거리는 경우는 어떻게 평가하나요?</h4>
            <p>
              두 경우 모두 단순히 <strong>읽었는지, 외웠는지</strong>만으로 우열을 판단하지 않는다.
              심사에서는 준비 방식보다 <strong>청중에게 얼마나 자연스럽고 이해 가능하게 전달되었는가</strong>를 본다.
            </p>
            <p>
              스크립트를 보면서 말하듯이 자연스럽게 읽는 경우, 발음과 흐름이 안정적이고 메시지가 명확하게 전달된다면 언어과 내용에서 긍정적으로 평가할 수 있다.
              다만 원고 의존이 분명하게 드러나고 청중에게 직접 전달하는 느낌이 약하다면, 전달에서 최고 수준 평가를 받기 어렵다.
            </p>
            <p>
              반대로 외워서 말하더라도 자주 멈추거나 버벅거려 흐름이 끊기고, 다음 문장을 떠올리느라 의미 전달이 약해진다면 높은 평가를 받기 어렵다.
              즉, <strong>외웠다는 사실 자체가 가산점이 되지는 않으며</strong>, 준비한 내용을 얼마나 안정감 있게 자기 말처럼 전달했는지가 더 중요하다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q11. 소품을 사용한 발표는 더 유리한가요?</h4>
            <p>
              반드시 그렇지 않다. 소품은 발표 내용을 보조하는 요소일 뿐, 소품 사용 자체가 가산점의 근거가 되지는 않는다.
              소품이 발표의 핵심 메시지를 더 잘 이해하도록 돕고, 발표 흐름과 자연스럽게 어울린다면 긍정적으로 볼 수 있다.
              그러나 소품이 과도하여 발표 집중을 흐리거나, 발표자의 전달보다 연출 효과가 더 두드러지는 경우에는 높은 평가 요인이 되지 않는다.
            </p>
            <p>
              즉, 심사에서는 소품의 화려함이 아니라 <strong>소품이 메시지 전달에 실제로 도움이 되었는가</strong>를 본다.
            </p>
          </div>

          <div class=&quot;faq-item&quot;>
            <h4>Q12. PPT나 시각자료를 사용한 발표는 더 높은 점수를 받아야 하나요?</h4>
            <p>
              아니다. PPT나 시각자료가 있다고 해서 자동으로 높은 점수를 주지 않는다. 시각자료는 발표 이해를 돕는 보조 수단일 뿐이며,
              평가의 중심은 여전히 발표자의 언어, 내용, 전달에 있다.
            </p>
            <p>
              PPT가 발표 구조를 더 명확하게 보여주거나, 정보 설명을 쉽게 이해하도록 돕는 경우에는 내용에 긍정적인 영향을 줄 수 있다.
              그러나 자료가 지나치게 많거나 복잡하여 발표자의 설명을 대신하는 수준이 되면 오히려 발표 전달력을 판단하기 어려워질 수 있다.
              따라서 심사에서는 <strong>자료의 유무</strong>보다 <strong>자료를 활용해 메시지를 얼마나 효과적으로 전달했는가</strong>를 본다.
            </p>
          </div>
        </section>

        <section class=&quot;section&quot; id=&quot;sheet&quot;>
          <h2>9. 최종 심사표 예시</h2>
          <table>

                <td>Ⅱ. 내용</td>

                <td>1~4점</td>
              </tr>

                <td>1~4점</td>
              </tr>
              <tr>
                <td colspan=&quot;2&quot;><strong>총점</strong></td>
                <td><strong>12점</strong></td>
              </tr>
            </tbody>
          </table>

          <div class=&quot;footer-box&quot;>
            <h3>최종 한 줄 기준</h3>
            <p>
              리얼스피치의 좋은 발표란, 어려운 영어를 많이 말하는 발표가 아니라,
              자신의 메시지를 영어로 이해 가능하고 자연스럽고 자신 있게 전달하는 발표이다.
            </p>
          </div>
        </section>

        <section class=&quot;section&quot; id=&quot;anchor&quot;>
          <h2>10. 부록. 심사위원 참고용 학년군별 표현 수준 앵커</h2>
          <div class=&quot;note&quot;>
            아래 기준은 <strong>별도 채점항목이 아니라</strong>, “쉬운 영어도 높은 평가가 가능한가”, “전달은 좋지만 표현 수준이 해당 학년 대비 지나치게 낮은가”를 판단할 때 참고하는 운영용 앵커이다.
            심사에서는 영어 난이도를 따로 점수화하지 않고, <strong>학년군에 맞는 표현 적절성과 내용</strong>를 함께 본다.
          </div>

          <h3>초등 저학년군</h3>
          <ul>
            <li>짧고 단순한 문장 중심의 발표여도 무방하다.</li>
            <li>기본 정보 전달, 문장 완결성, 또렷한 발음과 자연스러운 흐름이 중요하다.</li>
            <li>지나치게 어려운 표현보다, 자기 수준에서 명확하고 안정감 있게 전달하는지가 더 중요하다.</li>
          </ul>

          <h3>초등 고학년군</h3>
          <ul>
            <li>단순 문장만의 반복보다, 이유·경험·설명 연결이 어느 정도 드러나는 발표가 바람직하다.</li>
            <li>메시지가 분명하고 전달이 자연스러우면서도, 표현과 내용 전개에 일정한 확장이 보이는지를 함께 본다.</li>
            <li>매우 쉬운 문장만 반복되어 발표의 밀도와 전개가 제한되면 최고 수준 평가는 신중하게 판단한다.</li>
          </ul>

          <h3>중등군</h3>
          <ul>
            <li>학년 수준에 맞는 어휘, 문장 연결, 설명 또는 주장 전개가 어느 정도 드러나는 발표를 더 균형 있게 평가한다.</li>
            <li>매우 짧고 단순한 초저 수준 문장만으로 발표가 구성될 경우, 유창하더라도 표현의 폭과 내용 전개 측면에서 최고 수준 평가는 어렵다.</li>
            <li>반대로 중등 수준에 맞는 어휘와 문장을 사용하면서 약간의 비유창성이 있더라도, 전체 메시지가 이해 가능하고 발표 목적에 맞게 전달된다면 긍정적으로 평가할 수 있다.</li>
          </ul>
        </section>
      </main>

  .btn{font-family:inherit;font-size:13.5px;font-weight:500;padding:9px 18px;border-radius:6px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink-soft);transition:all .15s}
  .btn:hover{border-color:var(--accent);color:var(--accent-deep)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-deep)}
  .note{padding:0 40px 30px;font-size:11.5px;color:var(--ink-faint);line-height:1.6}
  .note b{color:var(--ink-soft);font-weight:600}

  @media (max-width:620px){
    .meta{grid-template-columns:1fr}
    header,.meta,.area,.total,.actions,.note,.cases{padding-left:22px;padding-right:22px}
    .cases{margin-left:22px;margin-right:22px}
    .ticker{padding-left:22px;padding-right:22px}
  }

  @media print{
    @page{margin:14mm}
    body{background:#fff;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}

    .ticker,.actions{display:none}
    .area,.meta,header,.total,.cases{break-inside:avoid}
    .field input,.memo textarea{border-color:#bbb}
    .row.sel{box-shadow:inset 3px 0 0 var(--accent)}
  }
</style>
</head>
<body>
<div class=&quot;sheet&quot;>

  <div class=&quot;ticker&quot;>
    <div class=&quot;legs&quot;>
      <span class=&quot;leg&quot;>Ⅰ 언어 <b id=&quot;t1&quot;>–</b></span>

    <span class=&quot;grand&quot;><span id=&quot;tg&quot;>0</span><small> / 12</small></span>
  </div>

  <header>
    <div class=&quot;kicker&quot;>RealSpeech · Final Evaluation</div>
    <h1>윤선생 리얼스피치 최종 심사지</h1>
    <p class=&quot;lead&quot;>세 영역을 각각 1~4점으로 평가합니다. 좋은 발표란 어려운 영어를 많이 말하는 발표가 아니라, 자신의 메시지를 이해 가능하고 자연스럽게 전달하는 발표입니다.</p>
    <div class=&quot;layers&quot;>
      <span class=&quot;lchip&quot;><b>Ⅰ</b> 소리·형식 층 (바닥선)</span>
      <span class=&quot;lchip&quot;><b>Ⅱ</b> 의미·기능 층 (천장)</span>
      <span class=&quot;lchip&quot;><b>Ⅲ</b> 태도·시각 층</span>
    </div>
  </header>

  <div class=&quot;meta&quot;>
    <div class=&quot;field&quot;><label>참가자명</label><input type=&quot;text&quot;></div>
    <div class=&quot;field&quot;><label>참가번호</label><input type=&quot;text&quot;></div>
    <div class=&quot;field&quot;><label>심사위원</label><input type=&quot;text&quot;></div>
    <div class=&quot;field&quot;><label>심사일</label><input type=&quot;text&quot; placeholder=&quot;2026. .  .&quot;></div>
    <div class=&quot;types&quot;>
      <span>학년군</span>
      <span class=&quot;gpill&quot; data-grade=&quot;elem_low&quot;>초등 저학년</span>
      <span class=&quot;gpill&quot; data-grade=&quot;elem_high&quot;>초등 고학년</span>
      <span class=&quot;gpill&quot; data-grade=&quot;mid&quot;>중등</span>
    </div>
    <div class=&quot;typehint grade&quot; id=&quot;gradehint&quot;></div>
    <div class=&quot;types&quot;>
      <span>발표 유형</span>
      <span class=&quot;pill&quot; data-type=&quot;info&quot;>정보 설명형</span>
      <span class=&quot;pill&quot; data-type=&quot;exp&quot;>경험 공유형</span>
      <span class=&quot;pill&quot; data-type=&quot;arg&quot;>주장·설득형</span>
      <span class=&quot;pill&quot; data-type=&quot;story&quot;>창의 스토리형</span>
      <span class=&quot;typenote&quot;>복수 선택 가능 · 첫 선택이 주 유형</span>
    </div>
    <div class=&quot;typehint&quot; id=&quot;typehint&quot;></div>
  </div>

  <!-- I. 언어 -->
  <section class=&quot;area&quot; data-area=&quot;1&quot;>
    <div class=&quot;ahead&quot;>
      <div class=&quot;num&quot;>Ⅰ</div>
      <div>
        <div class=&quot;atitle&quot;>언어 <span>또렷하게 들리는가</span></div>
        <div class=&quot;afocus&quot;>영어가 또렷하고 자연스럽게 들리는가? · 발음 / 억양 / 유창성 / 문장 정확성</div>
      </div>
      <div class=&quot;ascore&quot;>점수 <b data-badge=&quot;1&quot;>–</b></div>
    </div>
    <div class=&quot;scale&quot;>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area1&quot; value=&quot;4&quot;><span class=&quot;chip&quot;>4</span><span class=&quot;desc&quot;>발음과 억양이 또렷하고 자연스러우며, 문장이 안정적으로 이어져 내용을 쉽게 이해할 수 있다.</span></label>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area1&quot; value=&quot;3&quot;><span class=&quot;chip&quot;>3</span><span class=&quot;desc&quot;>일부 어색한 발음·억양·끊김이 있으나 전체 내용 이해에는 큰 어려움이 없다.</span></label>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area1&quot; value=&quot;2&quot;><span class=&quot;chip&quot;>2</span><span class=&quot;desc&quot;>발음, 끊김, 문장 오류가 반복되어 내용을 이해하기 어려운 부분이 있다.</span></label>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area1&quot; value=&quot;1&quot;><span class=&quot;chip&quot;>1</span><span class=&quot;desc&quot;>발화가 매우 불안정하거나 오류가 많아 전체 메시지를 이해하기 어렵다.</span></label>
    </div>
    <div class=&quot;guide&quot;>
      <h4>유의사항</h4>
      <div class=&quot;gnote&quot;>원어민 발음을 요구하지 않는다. 영어 난이도로 가점하지 않는다. 의미가 명확하면 사소한 문법 오류는 크게 감점하지 않는다. 여기서 보는 속도·멈춤은 <b>‘안 들릴 정도’까지만</b>이다 — 의미를 살리는 완급·멈춤·강조는 Ⅲ에서 본다.</div>
    </div>
    <div class=&quot;memo&quot;><label>메모</label><textarea></textarea></div>
  </section>

  <!-- II. 내용 -->
  <section class=&quot;area&quot; data-area=&quot;2&quot;>
    <div class=&quot;ahead&quot;>
      <div class=&quot;num&quot;>Ⅱ</div>
      <div>
        <div class=&quot;atitle&quot;>내용 <span>무엇을 말하는가</span></div>
        <div class=&quot;afocus&quot;>무엇을 말하고 싶은지 분명한가? · 학년 수준 적합성 / 주제 이해 / 내용 구성 / 자기 생각·경험·이유 / 메시지의 분명함</div>
      </div>
      <div class=&quot;ascore&quot;>점수 <b data-badge=&quot;2&quot;>–</b></div>
    </div>
    <div class=&quot;scale&quot;>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area2&quot; value=&quot;4&quot;><span class=&quot;chip&quot;>4</span><span class=&quot;desc&quot;>주제가 학년 수준에 적절하고 내용 흐름이 자연스러우며, 자기 생각·경험·이유가 구체적으로 담겨 있다. 무엇을 말하고 싶은지 분명하게 전달된다.</span></label>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area2&quot; value=&quot;3&quot;><span class=&quot;chip&quot;>3</span><span class=&quot;desc&quot;>전체 흐름은 안정적이고 핵심 메시지도 대체로 분명하나, 자기 생각이나 구체성이 일부 부족하다.</span></label>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area2&quot; value=&quot;2&quot;><span class=&quot;chip&quot;>2</span><span class=&quot;desc&quot;>내용 흐름이 다소 끊기거나 핵심 메시지가 약해 청중이 발표의 의도를 부분적으로만 이해할 수 있다.</span></label>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area2&quot; value=&quot;1&quot;><span class=&quot;chip&quot;>1</span><span class=&quot;desc&quot;>내용의 순서나 핵심이 분명하지 않아 무엇을 말하려는지 이해하기 어렵다.</span></label>
    </div>
    <div class=&quot;guide&quot;>
      <h4>유의사항</h4>
      <div class=&quot;gnote&quot;><b>학년 수준 적합성</b> — 내용이 학년에 맞는지 본다. 너무 쉬워 밀도가 부족하면 감점 요인이다. 학년보다 어려운 내용은 난이도 자체로 감점하지 않으며, 정확·유창한 발화는 Ⅰ, 소화·전달의 능숙함은 Ⅲ에서 본다. 원고 난이도·화려함만으로 판단하지 않는다. 발표 유형(정보·경험·주장·스토리)이 달라도 각 목적에 맞는 내용를 본다. 발표 길이 자체로 가점·감점하지 않는다. <b>자기 생각</b> — 내용에 발표자의 생각·이유·경험이 담기면 긍정적으로 본다. 정보형은 주제 선택 이유·경험 연결·느낌으로 완충하며, 형식적 “나는 ~라고 생각합니다”는 가점 요인이 아니다. <b>내용을 소화해 능숙하게 표현하는 정도(능숙한 전달)는 Ⅲ에서 본다.</b> <b>소품·PPT</b> — 유무로 가점하지 않는다. 메시지 전달에 도움이 되면 긍정, 연출이 과해 전달을 가리면 가점 요인이 아니다.</div>
    </div>
    <div class=&quot;memo&quot;><label>메모</label><textarea></textarea></div>
  </section>

  <!-- III. 전달 -->
  <section class=&quot;area&quot; data-area=&quot;3&quot;>
    <div class=&quot;ahead&quot;>
      <div class=&quot;num&quot;>Ⅲ</div>
      <div>
        <div class=&quot;atitle&quot;>전달 <span>어떻게 전달하는가</span></div>
        <div class=&quot;afocus&quot;>발표자로서 자연스럽고 자신 있게 전달하는가? · 시선 / 표정·자세 / 제스처 / 목소리 / 능숙한 전달 / 완급 / 완수</div>
      </div>
      <div class=&quot;ascore&quot;>점수 <b data-badge=&quot;3&quot;>–</b></div>
    </div>
    <div class=&quot;scale&quot;>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area3&quot; value=&quot;4&quot;><span class=&quot;chip&quot;>4</span><span class=&quot;desc&quot;>시선, 표정, 자세, 목소리가 안정적이며, 내용을 자기 말처럼 자연스럽고 자신 있게 전달한다. 중요한 대목에서 속도·멈춤·강조가 살아 발표 몰입감이 높다.</span></label>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area3&quot; value=&quot;3&quot;><span class=&quot;chip&quot;>3</span><span class=&quot;desc&quot;>전반적으로 안정적으로 발표하나, 일부 시선·표정·제스처나 속도 조절이 어색하다.</span></label>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area3&quot; value=&quot;2&quot;><span class=&quot;chip&quot;>2</span><span class=&quot;desc&quot;>긴장이나 원고 의존이 뚜렷해 발표 몰입이 약하고, 말하듯이 전달하는 느낌이 부족하다.</span></label>
      <label class=&quot;row&quot;><input type=&quot;radio&quot; name=&quot;area3&quot; value=&quot;1&quot;><span class=&quot;chip&quot;>1</span><span class=&quot;desc&quot;>시선, 자세, 목소리, 발표 흐름이 매우 불안정하여 청중이 발표에 몰입하기 어렵다.</span></label>
    </div>
    <div class=&quot;guide&quot;>
      <h4>유의사항</h4>
      <div class=&quot;gnote&quot;>제스처는 적정 수준을 본다 — 너무 많으면 산만하고, 손짓 없이 경직되면 전달력이 떨어진다(단 영상 환경상 적은 것을 과도하게 감점하진 않는다). 영상 환경 한계로 생긴 시선 문제도 과도하게 감점하지 않는다. <b>능숙한 전달</b> — 원고를 눈으로 읽거나 책 읽듯 말하지 않고 내용을 소화해 능숙하게 표현하는지를 본다. 이는 영어 구사의 매끄러움(유창성, Ⅰ)과 다르다. <b>끊김 경계</b> — 단어가 안 떠올라 끊기면 Ⅰ, 흐름을 잊어 멈추면 Ⅲ. <b>완급 경계</b> — 발음이 뭉개져 안 들리면 Ⅰ, 다 들리는데 속도·멈춤·강조로 의미를 못 살리면 Ⅲ. <b>발표 미완수</b> — 발표를 끝까지 마무리하지 못하거나, 제출 영상의 뒷부분이 잘려 발표가 마무리되지 않은 채 끝나면 발표 완수 측면에서 감점 사유가 된다.</div>
    </div>
    <div class=&quot;memo&quot;><label>메모</label><textarea></textarea></div>
  </section>

  <!-- 경계 사례 빠른 판별 -->
  <div class=&quot;cases&quot;>
    <h4>경계 사례 빠른 판별</h4>
    <div class=&quot;lede&quot;>아래는 헷갈리는 현상을 어느 영역에서 볼지 정한다. 소리·언어 문제는 Ⅰ, 전달(능숙함·완급) 문제는 Ⅲ.</div>
    <div class=&quot;crow&quot;><span class=&quot;sit&quot;><b>까먹어서 생긴 긴 멈춤</b></span><span class=&quot;ver&quot;><span class=&quot;tag tag3&quot;>Ⅲ</span>흐름을 잊어 멈추면 능숙한 전달. 단어가 안 떠올라 끊기면 <span class=&quot;tag tag1&quot;>Ⅰ</span>.</span></div>
    <div class=&quot;crow&quot;><span class=&quot;sit&quot;><b>다 들리는데 밋밋한 톤</b></span><span class=&quot;ver&quot;><span class=&quot;tag tag3&quot;>Ⅲ</span>단어가 다 들리면 소리는 통과. 완급·강조를 못 살린 것이므로 전달(Ⅲ).</span></div>
    <div class=&quot;crow&quot;><span class=&quot;sit&quot;><b>너무 빠른 속도</b></span><span class=&quot;ver&quot;><span class=&quot;tag tag1&quot;>Ⅰ</span>빨라서 안 들림 · <span class=&quot;tag tag3&quot;>Ⅲ</span>다 들리지만 몰아쳐 메시지가 안 박힘.</span></div>
    <div class=&quot;crow&quot;><span class=&quot;sit&quot;><b>강세 / 강조</b></span><span class=&quot;ver&quot;><span class=&quot;tag tag1&quot;>Ⅰ</span>단어 강세가 영어로서 틀림 · <span class=&quot;tag tag3&quot;>Ⅲ</span>중요한 말에 힘을 안 줌.</span></div>
    <div class=&quot;crow&quot;><span class=&quot;sit&quot;><b>억양이 내용과 어긋남</b></span><span class=&quot;ver&quot;><span class=&quot;tag tag3&quot;>Ⅲ</span>슬픈 이야기를 신난 톤으로 — 멜로디는 멀쩡해도 감정 불일치.</span></div>
  </div>

  <!-- Total -->
  <div class=&quot;total&quot;>
    <div class=&quot;breakdown&quot;>
      <span class=&quot;bd&quot;>Ⅰ 언어 <b id=&quot;b1&quot;>–</b></span>
      <span class=&quot;bd&quot;>Ⅱ 내용 <b id=&quot;b2&quot;>–</b></span>
      <span class=&quot;bd&quot;>Ⅲ 전달 <b id=&quot;b3&quot;>–</b></span>
    </div>
    <div class=&quot;grandbox&quot;>
      <div class=&quot;lab&quot;>총점</div>
      <div class=&quot;n&quot;><span id=&quot;g&quot;>0</span><small> / 12</small></div>
    </div>
  </div>

  <div class=&quot;memo&quot; style=&quot;padding:0 40px 4px&quot;>
    <label>종합 코멘트</label><textarea style=&quot;min-height:64px&quot;></textarea>
  </div>

  <div class=&quot;actions&quot;>
    <button class=&quot;btn primary&quot; onclick=&quot;window.print()&quot;>인쇄 / PDF 저장</button>
    <button class=&quot;btn&quot; onclick=&quot;resetAll()&quot;>초기화</button>
  </div>

  <div class=&quot;note&quot;><b>채점 원칙</b> 세 영역은 소리·형식(Ⅰ) / 의미·기능(Ⅱ) / 태도(Ⅲ)로 독립 평가합니다. 운율은 ‘안 들릴 정도면 Ⅰ, 다 들리는데 못 살리면 Ⅱ’의 바닥선·천장 기준으로 가릅니다. 같은 현상을 두 영역에서 기계적으로 두 번 깎지 않되, 소리도 못 넘고 내용도 못 살린 진짜 이중 결함은 각 영역에 따로 반영합니다. 발표 시간 길이, 영어 난이도, 원고의 화려함 자체는 가점·감점 사유가 아닙니다.</div>

<script>
  var hints = {
    info:'<b>정보 설명형</b> — 설명 순서·핵심 정보의 명확성, 중요한 부분에서의 속도·강조 조절을 중심으로 본다. 정보가 많다고 좋은 발표는 아니다.',
    exp:'<b>경험 공유형</b> — 자기 생각·감정의 자연스러운 드러남과 소화된 능숙한 전달을 중심으로 본다. 쉬운 문장이라도 메시지가 분명하면 좋다.',
    arg:'<b>주장·설득형</b> — 주장-근거의 연결, 설득 포인트에 맞는 강조·멈춤, 결론의 분명함을 중심으로 본다.',

  };
  var gradeHints = {
    elem_low:'<b>초등 저학년</b> — 짧고 단순한 문장 중심이어도 무방하다. 기본 정보 전달·문장 완결성·또렷한 발음과 자연스러운 흐름이 중요하다. 어려운 표현보다 자기 수준에서 명확하고 안정감 있게 전달하는지를 본다.',
    elem_high:'<b>초등 고학년</b> — 단순 문장 반복보다 이유·경험·설명의 연결이 어느 정도 드러나면 바람직하다. 매우 쉬운 문장만 반복되어 발표의 밀도·전개가 제한되면 최고점(4)은 신중하게 판단한다.',
    mid:'<b>중등</b> — 학년 수준에 맞는 어휘·문장 연결·전개가 드러나는 발표를 균형 있게 평가한다. 매우 짧고 단순한 초저 수준 문장만으로 구성되면 유창해도 표현 폭·전개 측면에서 최고점(4)은 어렵다. 다소 비유창해도 수준에 맞는 표현으로 메시지가 이해 가능하면 긍정적으로 본다.'
  };

  // 발표 유형: 복수 선택, 첫 선택이 주 유형
  function renderTypeHint(){
    var ons = Array.prototype.map.call(document.querySelectorAll('.pill.on'), function(p){return p;});
    var hint = document.getElementById('typehint');
    if(!ons.length){ hint.classList.remove('show'); hint.innerHTML=''; return; }
    hint.innerHTML = ons.map(function(p){ return hints[p.dataset.type]; }).join('<hr style=&quot;border:none;border-top:1px dashed var(--line);margin:8px 0&quot;>');
    hint.classList.add('show');
  }
  document.querySelectorAll('.pill').forEach(function(p){
    p.addEventListener('click',function(){
      p.classList.toggle('on');
      // 주 유형 표시: 켜진 칩 중 DOM상 첫 번째
      document.querySelectorAll('.pill').forEach(function(x){x.classList.remove('primary-type')});
      var firstOn = document.querySelector('.pill.on');
      if(firstOn) firstOn.classList.add('primary-type');
      renderTypeHint();
    });
  });

  // 학년군: 단일 선택
  document.querySelectorAll('.gpill').forEach(function(p){
    p.addEventListener('click',function(){
      var on=p.classList.contains('on');
      document.querySelectorAll('.gpill').forEach(function(x){x.classList.remove('on')});
      var hint=document.getElementById('gradehint');
      if(on){hint.classList.remove('show');hint.innerHTML='';}
      else{p.classList.add('on');hint.innerHTML=gradeHints[p.dataset.grade];hint.classList.add('show');}
    });
  });

  function recompute(){
    var total=0;
    for(var a=1;a<=3;a++){
      var sel=document.querySelector('input[name=&quot;area'+a+'&quot;]:checked');
      var v=sel?parseInt(sel.value):0;
      var disp=sel?v:'–';
      document.querySelector('[data-badge=&quot;'+a+'&quot;]').textContent=disp;
      document.getElementById('b'+a).textContent=disp;
      document.getElementById('t'+a).textContent=disp;
      document.querySelector('.area[data-area=&quot;'+a+'&quot;]').classList.toggle('done',!!sel);
      // 같은 영역 내 sel 클래스 동기화(엣지 케이스 방지)
      document.querySelectorAll('input[name=&quot;area'+a+'&quot;]').forEach(function(o){
        o.closest('.row').classList.toggle('sel',o.checked);
      });
      if(sel){total+=v;}
    }
    document.getElementById('g').textContent=total;
    document.getElementById('tg').textContent=total;
  }
  document.querySelectorAll('.row input').forEach(function(inp){
    inp.addEventListener('change',recompute);
  });
  function resetAll(){
    document.querySelectorAll('.row input').forEach(function(i){i.checked=false;i.closest('.row').classList.remove('sel')});
    document.querySelectorAll('textarea,.meta input').forEach(function(i){i.value=''});
    document.querySelectorAll('.pill,.gpill').forEach(function(p){p.classList.remove('on');p.classList.remove('primary-type')});
    document.getElementById('typehint').classList.remove('show');
    document.getElementById('gradehint').classList.remove('show');
    recompute();
  }
  recompute();
</script>
</body>

      </div>
      <div class=&quot;ascore&quot;><span class=&quot;v&quot; data-v=&quot;1&quot;>–</span><span class=&quot;spread&quot; data-sp=&quot;1&quot;></span></div>
    </div>
    <div class=&quot;steps&quot; data-steps=&quot;1&quot;></div>
    <div class=&quot;anchor&quot;>
      <div class=&quot;a&quot;><b>3.5~4</b> 단어가 또렷하고 억양도 자연스러우며 막힘이 없다. 귀로만 들어도 또렷이 따라간다.</div>
      <div class=&quot;a&quot;><b>2.5~3</b> 일부 어색하거나 끊김·오류가 있으나 이해에 큰 어려움은 없다.</div>
    </div>
    <div class=&quot;scalehint&quot;>2차에서는 “1차 4점과 4점 사이”를 0.5로 갈라 상위권을 변별합니다. 같은 4점이라도 흠 없는 4와 아쉬운 3.5를 구분하세요. <b>경계</b> — 발음·억양이 뭉개져 안 들리는 수준은 여기(Ⅰ), 다 들리는데 의미를 살리는 완급·멈춤·강조가 부족하면 Ⅲ에서 봅니다.</div>
    <div class=&quot;qmemo&quot;>
      <div class=&quot;box plus&quot;><label>결정적 강점 <span class=&quot;reqflag&quot; data-req=&quot;1p&quot;>· 입력 권장</span></label><textarea data-memo=&quot;1p&quot;></textarea></div>
      <div class=&quot;box minus&quot;><label>감점 요인</label><textarea data-memo=&quot;1m&quot;></textarea></div>
    </div>
  </section>

  <!-- Ⅱ -->
  <section class=&quot;area&quot; data-area=&quot;2&quot;>
    <div class=&quot;ahead&quot;>
      <div class=&quot;num&quot;>Ⅱ</div>
      <div>
        <div class=&quot;atitle&quot;>내용 <span class=&quot;w&quot; id=&quot;w2&quot;>×1.5</span></div>
        <div class=&quot;afocus&quot;>학년 수준 적합성 / 주제 이해 / 내용 구성 / 자기 생각·경험·이유 / 메시지의 분명함</div>
      </div>
      <div class=&quot;ascore&quot;><span class=&quot;v&quot; data-v=&quot;2&quot;>–</span><span class=&quot;spread&quot; data-sp=&quot;2&quot;></span></div>
    </div>
    <div class=&quot;steps&quot; data-steps=&quot;2&quot;></div>
    <div class=&quot;anchor&quot;>
      <div class=&quot;a&quot;><b>3.5~4</b> 주제가 학년 수준에 적절하고 흐름이 자연스러우며, 자기 생각·경험·이유가 구체적으로 담겨 무엇을 말하고 싶은지 분명하다.</div>
      <div class=&quot;a&quot;><b>2.5~3</b> 흐름·핵심은 잡히나 자기 생각이 옅거나 구체성이 부족한 곳이 있다.</div>
    </div>
    <div class=&quot;scalehint&quot;>무엇을 말하고 싶은지가 분명한지를 봅니다. 너무 쉬워 밀도가 부족하지 않은지와 <b>자기 생각·경험·이유</b>가 담겼는지를 0.5 단위로 가르세요. 학년보다 어려운 내용은 난이도 자체로 감점하지 않으며 정확·유창한 발화는 Ⅰ, 소화·전달은 Ⅲ에서 봅니다. 정보형은 선택 이유·경험 연결·느낌으로 완충합니다.</div>
    <div class=&quot;qmemo&quot;>
      <div class=&quot;box plus&quot;><label>결정적 강점 <span class=&quot;reqflag&quot; data-req=&quot;2p&quot;>· 입력 권장</span></label><textarea data-memo=&quot;2p&quot;></textarea></div>
      <div class=&quot;box minus&quot;><label>감점 요인</label><textarea data-memo=&quot;2m&quot;></textarea></div>
    </div>
  </section>

  <!-- Ⅲ -->
  <section class=&quot;area&quot; data-area=&quot;3&quot;>
    <div class=&quot;ahead&quot;>
      <div class=&quot;num&quot;>Ⅲ</div>
      <div>
        <div class=&quot;atitle&quot;>전달 <span class=&quot;afocus&quot; style=&quot;display:inline&quot;>능숙하게 전달하는가</span></div>
        <div class=&quot;afocus&quot;>시선 / 표정·자세 / 제스처 / 목소리 / 능숙한 전달 / 완급(속도·멈춤·강조) / 완수</div>
      </div>
      <div class=&quot;ascore&quot;><span class=&quot;v&quot; data-v=&quot;3&quot;>–</span><span class=&quot;spread&quot; data-sp=&quot;3&quot;></span></div>
    </div>
    <div class=&quot;steps&quot; data-steps=&quot;3&quot;></div>
    <div class=&quot;anchor&quot;>
      <div class=&quot;a&quot;><b>3.5~4</b> 시선·자세·목소리가 안정적이고, 내용을 자기 말처럼 자신 있게 전달하며 완급·강조가 살아 몰입된다.</div>
      <div class=&quot;a&quot;><b>2.5~3</b> 대체로 차분하나 책 읽듯 평탄하거나(소화 부족), 시선 흔들림·속도 조절 미흡이 일부 있다.</div>
    </div>
    <div class=&quot;scalehint&quot;><b>능숙한 전달</b>(내용을 소화해 능숙하게 표현하는지 — 영어 유창성(Ⅰ)과 다름)과 <b>완급</b>(속도·멈춤·강조로 의미를 살렸는지)이 상위권 변별 포인트입니다. 단어가 안 떠올라 끊기면 Ⅰ, 흐름을 잊어 멈추면 Ⅲ. 발표를 끝까지 마치지 못했거나 제출 영상 뒷부분이 잘려 마무리되지 않은 경우 발표 완수에서 감점합니다.</div>
    <div class=&quot;qmemo&quot;>
      <div class=&quot;box plus&quot;><label>결정적 강점</label><textarea data-memo=&quot;3p&quot;></textarea></div>
      <div class=&quot;box minus&quot;><label>감점 요인</label><textarea data-memo=&quot;3m&quot;></textarea></div>
    </div>
  </section>

  <!-- Aggregate -->
  <div class=&quot;agg&quot;>
    <h3>심사위원 합산 (현재 참가자)</h3>
    <div class=&quot;sub&quot;>아래는 입력된 모든 심사위원 점수의 평균입니다. 영역 편차가 큰 곳(<b>≥1.0</b>)은 의견이 갈린 지점이므로 토론 우선 안건으로 표시됩니다.</div>
    <div class=&quot;aggrid&quot;>
      <div class=&quot;aggcell&quot; data-agg=&quot;1&quot;><div class=&quot;k&quot;>Ⅰ 언어</div><div class=&quot;n&quot;>–</div><div class=&quot;dv&quot;></div></div>
      <div class=&quot;aggcell&quot; data-agg=&quot;2&quot;><div class=&quot;k&quot;>Ⅱ 내용</div><div class=&quot;n&quot;>–</div><div class=&quot;dv&quot;></div></div>
      <div class=&quot;aggcell&quot; data-agg=&quot;3&quot;><div class=&quot;k&quot;>Ⅲ 전달</div><div class=&quot;n&quot;>–</div><div class=&quot;dv&quot;></div></div>
      <div class=&quot;aggcell&quot; data-agg=&quot;g&quot;><div class=&quot;k&quot;>합산 총점</div><div class=&quot;n&quot;>–</div><div class=&quot;dv&quot;></div></div>
    </div>
  </div>

  <div class=&quot;ranksave&quot;>
    <button class=&quot;btn primary&quot; id=&quot;savebtn&quot;>이 참가자 순위표에 저장</button>
    <button class=&quot;btn&quot; id=&quot;clearbtn&quot;>현재 참가자 입력 초기화</button>
    <span class=&quot;savehint&quot;>저장하면 아래 순위표에 합산 점수로 자동 정렬됩니다.</span>
  </div>

  <!-- Ranking -->
  <div class=&quot;rank&quot;>
    <h3>최종 순위 (합산 기준 자동 정렬)</h3>
    <div class=&quot;sub&quot;>동점 시 <b>Ⅱ → Ⅰ → Ⅲ</b> 순으로 자동 정렬하되, 동점은 표시만 하고 최종 결정은 토론 합의로 합니다. 점선은 최상위 수상자 컷(상위 36명)입니다.</div>
    <table id=&quot;ranktable&quot;>
      <thead><tr><th>순위</th><th>참가자</th><th>Ⅰ</th><th>Ⅱ</th><th>Ⅲ</th><th>총점</th><th></th></tr></thead>
      <tbody id=&quot;rankbody&quot;><tr><td colspan=&quot;7&quot; class=&quot;empty&quot;>아직 저장된 참가자가 없습니다.</td></tr></tbody>
    </table>
  </div>

  <div class=&quot;actions&quot;>
    <button class=&quot;btn primary&quot; onclick=&quot;window.print()&quot;>인쇄 / PDF 저장</button>
    <button class=&quot;btn&quot; id=&quot;resetall&quot;>전체 초기화</button>
  </div>

  <div class=&quot;note&quot;><b>채점 원칙</b> 2차는 1차를 통과한 상위권을 정밀 변별하는 단계입니다. 척도를 0.5 단위로 넓혀 천장에 몰린 점수를 가르고, 다수 심사위원의 독립 채점을 합산해 토론의 출발점으로 삼습니다. 점수는 순위를 못 박지 않으며 최종 결정은 합의로 이뤄집니다. <b>가중치(Ⅱ×1.5)</b>는 기본 꺼져 있으며, 내용로 변별하자는 합의가 있을 때만 켜서 참고합니다. <b>정성 코멘트</b>(결정적 강점/감점 요인)는 토론에서 점수 차의 근거를 제시하기 위한 것이므로 가능한 한 채워주세요.</div>

</div>

<script>
(function(){
  var SCALE=[1,1.5,2,2.5,3,3.5,4];
  var weightOn=false;
  var W={1:1,2:1.5,3:1};               // 가중치 ON일 때 Ⅱ
  var judges=[{scores:{1:null,2:null,3:null}, memos:{}}];
  var cur=0;                            // 현재 심사위원 index
  var players=[];                       // 저장된 참가자

  // ---- 척도 버튼 생성 ----
  document.querySelectorAll('.steps').forEach(function(box){
    var area=box.dataset.steps;
    SCALE.forEach(function(v){
      var b=document.createElement('button');
      b.className='step'+(v%1?' half':'');
      b.textContent=v;
      b.dataset.val=v; b.dataset.area=area;
      b.addEventListener('click',function(){
        judges[cur].scores[area]=v;
        renderSteps(); recompute();
      });
      box.appendChild(b);
    });
  });
  function renderSteps(){
    document.querySelectorAll('.step').forEach(function(b){
      var sel=judges[cur].scores[b.dataset.area];
      b.classList.toggle('sel', sel!==null && parseFloat(b.dataset.val)===sel);
    });
  }

  // ---- 가중치 토글 ----
  var wt=document.getElementById('wtoggle');
  wt.addEventListener('click',function(){
    weightOn=!weightOn;
    wt.classList.toggle('on',weightOn);
    document.getElementById('w2').classList.toggle('show',weightOn);
    recompute(); renderRank();
  });
  function wOf(area){ return weightOn?W[area]:1; }
  function maxScore(){ return 4*(wOf(1)+wOf(2)+wOf(3)); }

  // ---- 심사위원 탭 ----
  function renderJudgeTabs(){
    var box=document.getElementById('jtabs'); box.innerHTML='';
    judges.forEach(function(j,i){
      var t=document.createElement('button');
      t.className='jtab'+(i===cur?' on':''); t.textContent='심사위원 '+(i+1);
      t.addEventListener('click',function(){ saveMemos(); cur=i; loadJudge(); });
      box.appendChild(t);
    });
    document.getElementById('tjudge').textContent='심사위원 '+(cur+1);
  }
  document.getElementById('addjudge').addEventListener('click',function(){
    saveMemos(); judges.push({scores:{1:null,2:null,3:null}, memos:{}});
    cur=judges.length-1; renderJudgeTabs(); loadJudge();
  });
  function loadJudge(){
    renderJudgeTabs(); renderSteps();
    // 메모 복원
    document.querySelectorAll('[data-memo]').forEach(function(t){
      t.value=judges[cur].memos[t.dataset.memo]||'';
    });
    recompute();
  }
  function saveMemos(){
    document.querySelectorAll('[data-memo]').forEach(function(t){
      judges[cur].memos[t.dataset.memo]=t.value;
    });
  }
  document.querySelectorAll('[data-memo]').forEach(function(t){
    t.addEventListener('input',function(){ judges[cur].memos[t.dataset.memo]=t.value; checkReq(); });
  });

  // ---- 합산 계산 ----
  function aggregate(){
    var sums={1:0,2:0,3:0}, cnts={1:0,2:0,3:0}, mins={1:9,2:9,3:9}, maxs={1:0,2:0,3:0};
    judges.forEach(function(j){
      [1,2,3].forEach(function(a){
        var v=j.scores[a];
        if(v!==null){ sums[a]+=v; cnts[a]++; mins[a]=Math.min(mins[a],v); maxs[a]=Math.max(maxs[a],v); }
      });
    });
    var avg={}, spread={};
    [1,2,3].forEach(function(a){
      avg[a]= cnts[a]? sums[a]/cnts[a] : null;
      spread[a]= cnts[a]>1 ? maxs[a]-mins[a] : 0;
    });
    return {avg:avg, spread:spread};
  }

  function recompute(){
    // 현재 심사위원 점수 → 티커
    var s=judges[cur].scores, total=0, anyNull=false;
    [1,2,3].forEach(function(a){
      var v=s[a];
      document.getElementById('t'+a).textContent = v===null?'–':v;
      if(v===null) anyNull=true; else total+=v*wOf(a);
    });
    document.getElementById('tg').textContent = (Math.round(total*10)/10);
    document.getElementById('tmax').textContent = maxScore();

    // 합산 패널 + 영역 헤더
    var ag=aggregate();
    [1,2,3].forEach(function(a){
      var av=ag.avg[a], sp=ag.spread[a];
      var vEl=document.querySelector('[data-v=&quot;'+a+'&quot;]'),
          spEl=document.querySelector('[data-sp=&quot;'+a+'&quot;]'),
          cell=document.querySelector('[data-agg=&quot;'+a+'&quot;]');
      vEl.textContent = av===null?'–':(Math.round(av*100)/100);
      document.querySelector('.area[data-area=&quot;'+a+'&quot;]').classList.toggle('done', s[a]!==null);
      if(judges.length>1 && sp>0){
        spEl.textContent='편차 '+sp; spEl.classList.toggle('hot',sp>=1);
      } else { spEl.textContent=''; spEl.classList.remove('hot'); }
      cell.querySelector('.n').innerHTML = av===null?'–':(Math.round(av*100)/100)+(weightOn&&a==2?'<small> ×1.5</small>':'');
      cell.querySelector('.dv').textContent = (judges.length>1 && sp>0)?('심사위원 편차 '+sp):'';
      cell.classList.toggle('hot', judges.length>1 && sp>=1);
    });
    // 합산 총점
    var gcell=document.querySelector('[data-agg=&quot;g&quot;]');
    var allHave=[1,2,3].every(function(a){return ag.avg[a]!==null;});
    var gtot = allHave ? [1,2,3].reduce(function(t,a){return t+ag.avg[a]*wOf(a);},0):null;
    gcell.querySelector('.n').innerHTML = gtot===null?'–':(Math.round(gtot*100)/100)+'<small> / '+maxScore()+'</small>';
    checkReq();
  }

  // ---- 강점 코멘트 권장 플래그(점수는 줬는데 강점 코멘트 비어있으면 안내) ----
  function checkReq(){
    [1,2].forEach(function(a){
      var scored=judges[cur].scores[a]!==null;
      var empty=!(judges[cur].memos[a+'p']||'').trim();
      var f=document.querySelector('[data-req=&quot;'+a+'p&quot;]');
      if(f) f.classList.toggle('show', scored && empty);
    });
  }

  // ---- 저장 → 순위표 ----
  function curAggTotal(){
    var ag=aggregate();
    if(![1,2,3].every(function(a){return ag.avg[a]!==null;})) return null;
    var total=[1,2,3].reduce(function(t,a){return t+ag.avg[a]*wOf(a);},0);
    return {avg:ag.avg, total:Math.round(total*100)/100};
  }
  document.getElementById('savebtn').addEventListener('click',function(){
    saveMemos();
    var name=document.getElementById('pname').value.trim()||('참가자 '+(players.length+1));
    var no=document.getElementById('pno').value.trim();
    var r=curAggTotal();
    if(!r){ alert('모든 영역(Ⅰ·Ⅱ·Ⅲ)에 최소 한 명 이상의 심사위원 점수가 필요합니다.'); return; }
    players.push({name:name, no:no, avg:r.avg, total:r.total});
    renderRank();
    clearCurrent();
  });
  document.getElementById('clearbtn').addEventListener('click',clearCurrent);
  function clearCurrent(){
    judges=[{scores:{1:null,2:null,3:null}, memos:{}}]; cur=0;
    document.getElementById('pname').value=''; document.getElementById('pno').value='';
    document.querySelectorAll('[data-memo]').forEach(function(t){t.value='';});
    renderJudgeTabs(); renderSteps(); recompute();
  }

  function cmp(a,b){
    if(b.total!==a.total) return b.total-a.total;
    if(b.avg[2]!==a.avg[2]) return b.avg[2]-a.avg[2];   // Ⅱ
    if(b.avg[1]!==a.avg[1]) return b.avg[1]-a.avg[1];   // Ⅰ
    return b.avg[3]-a.avg[3];                            // Ⅲ
  }
  function renderRank(){
    // 가중치 변경 시 총점 재계산
    players.forEach(function(p){
      p.total=Math.round([1,2,3].reduce(function(t,a){return t+p.avg[a]*wOf(a);},0)*100)/100;
    });
    var arr=players.slice().sort(cmp);
    var body=document.getElementById('rankbody'); body.innerHTML='';
    if(!arr.length){ body.innerHTML='<tr><td colspan=&quot;7&quot; class=&quot;empty&quot;>아직 저장된 참가자가 없습니다.</td></tr>'; return; }
    arr.forEach(function(p,i){
      // 동점 판정: 바로 위/아래와 total 동일
      var tie=(i>0&&arr[i-1].total===p.total)||(i<arr.length-1&&arr[i+1].total===p.total);
      var tr=document.createElement('tr'); if(tie) tr.className='tie';
      tr.innerHTML='<td class=&quot;r&quot;>'+(i+1)+'</td>'+
        '<td>'+esc(p.name)+(p.no?' <span style=&quot;color:var(--ink-faint);font-size:11px&quot;>'+esc(p.no)+'</span>':'')+(tie?'<span class=&quot;tiebadge&quot;>동점</span>':'')+'</td>'+
        '<td>'+round2(p.avg[1])+'</td><td>'+round2(p.avg[2])+(weightOn?' <span style=&quot;color:var(--gold-deep);font-size:10px&quot;>×1.5</span>':'')+'</td><td>'+round2(p.avg[3])+'</td>'+
        '<td class=&quot;tot&quot;>'+p.total+'</td>'+
        '<td><button class=&quot;delx&quot; data-i=&quot;'+i+'&quot;>×</button></td>';
      body.appendChild(tr);
      // 36명 컷 라인
      if(i===35 && arr.length>36){
        tr.classList.add('cut');
        var c=document.createElement('tr'); c.className='cutrow';
        c.innerHTML='<td colspan=&quot;7&quot;>↑ 최상위 수상자 컷 (상위 36명)</td>'; body.appendChild(c);
      }
    });
    body.querySelectorAll('.delx').forEach(function(b){
      b.addEventListener('click',function(){
        var sorted=players.slice().sort(cmp); var target=sorted[+b.dataset.i];
        players=players.filter(function(p){return p!==target;}); renderRank();
      });
    });
  }
  function round2(n){return Math.round(n*100)/100;}
  function esc(s){return (s||'').replace(/[&<>&quot;]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','&quot;':'&quot;'}[c];});}

  document.getElementById('resetall').addEventListener('click',function(){
    if(!confirm('모든 참가자 순위와 현재 입력을 초기화합니다. 계속할까요?')) return;
    players=[]; renderRank(); clearCurrent();
  });

  // init
  renderJudgeTabs(); renderSteps(); recompute(); renderRank();
})();
</script>
</body>
</html>

<script>
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      var target=t.dataset.pane;
      document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x===t)});
      document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('on',p.dataset.pane===target)});
    });
  });
</script>
</body>
</html>
