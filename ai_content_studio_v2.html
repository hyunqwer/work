function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.querySelector('i').setAttribute('data-lucide', type==='ok' ? 'check-circle' : 'alert-circle');
  el.querySelector('i').className = `w-4 h-4 flex-shrink-0 ${type==='ok'?'text-emerald-400':'text-red-400'}`;
  lucide.createIcons({el});
  el.classList.remove('-translate-y-20','opacity-0');
  el.classList.add('translate-y-0','opacity-100');
  setTimeout(()=>{ el.classList.add('-translate-y-20','opacity-0'); el.classList.remove('translate-y-0','opacity-100'); }, 2800);
}

function levelTabs(activeFn) {
  return `<div class="flex gap-1 border-b border-slate-200 mb-0 flex-shrink-0">
    ${['L1','L2','L3'].map(l=>`
      <button onclick="${activeFn}('${l}')" class="px-5 py-2 text-xs font-bold rounded-t-lg border-b-2 transition-colors ${activeLevel===l ? 'border-indigo-500 text-indigo-700 bg-white' : 'border-transparent text-slate-400 hover:text-slate-600 hover:bg-white/50'}">
        ${l==='L1'?'Level 1 · Foundation':l==='L2'?'Level 2 · Core':'Level 3 · Challenge'}
      </button>`).join('')}
  </div>`;
}

window.toggleApprove = function(btn) {
  const on = btn.dataset.on === '1';
  btn.dataset.on = on ? '0' : '1';
  btn.className = `p-1.5 border rounded-lg transition-all ${on ? 'text-slate-400 bg-white border-slate-200 hover:border-indigo-300' : 'text-emerald-600 bg-emerald-50 border-emerald-200'}`;
  btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="${on?'20 6 9 17 4 12':'20 6 9 17 4 12'}"></polyline></svg>`;
  toast(on ? '승인을 취소했습니다.' : '문항을 승인했습니다.', on?'err':'ok');
};

            {icon:'🎯',t:'독해 기능',v:'추론 · 함축 의미 집중'},
            {icon:'📰',t:'추천 주제',v:'AI와 창의성 / 환경 정책'},
            {icon:'📊',t:'권장 구조',v:'주장·근거형 (C형)'},
            {icon:'📝',t:'표현 과업',v:'찬반 에세이 (L3 연계)'},
          ].map(r=>`<div class="bg-white/10 rounded-xl p-2.5">
            <p class="text-[10px] text-indigo-200 mb-0.5">${r.icon} ${r.t}</p>
            <p class="text-xs font-bold text-white">${r.v}</p>
          </div>`).join('')}
        </div>
      </div>
      <!-- Teacher actions -->
      <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-3">교사 액션 필요</p>
        <div class="space-y-2">
          ${[
            {t:'추론 취약 학생 14명 개별 코칭',c:'text-red-600 bg-red-50 border-red-100'},
            {t:'어휘 shortcut 복습 카드 발송',c:'text-amber-700 bg-amber-50 border-amber-100'},
            {t:'학부모 리포트 발송 (완료율 87%)',c:'text-slate-600 bg-slate-50 border-slate-100'},
          ].map(a=>`<div class="text-[11px] ${a.c} border rounded-lg p-2 leading-tight font-medium">${a.t}</div>`).join('')}
        </div>
      </div>
    </div>
  </div>
</div>`;
}

// ──────────────────────────────────────────────
// NAVIGATION
// ──────────────────────────────────────────────
const RENDERERS = [null, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5, renderStep6, renderStep7, renderStep8];

function renderSidebar() {
  const container = document.getElementById('stepper');
  container.innerHTML = '<div class="step-line"></div>' + STEPS.map(s=>{
    const done = s.id < currentStep;
    const active = s.id === currentStep;
    return `<button onclick="goStep(${s.id})" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-left transition-colors relative z-10 ${active?'bg-indigo-50 text-indigo-700':done?'text-slate-500 hover:bg-slate-50':'text-slate-400 hover:bg-slate-50'}">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-[11px] font-bold border ${active?'bg-indigo-600 text-white border-indigo-600':done?'bg-emerald-500 text-white border-emerald-500':'bg-white text-slate-400 border-slate-200'}">
        ${done ? '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : s.id}
      </div>
      <span class="text-[11px] font-${active?'bold':'semibold'} leading-tight">${s.title}</span>
    </button>`;
  }).join('');
}

function renderHeader() {
  const s = STEPS[currentStep-1];
  document.getElementById('step-title').textContent = `${s.id}. ${s.title}`;
  const badge = document.getElementById('step-badge');
  const isLast = currentStep === 8;
  badge.textContent = isLast ? '완료됨' : currentStep < 7 ? '검수 중' : '패키징';
  badge.className = `pill text-[11px] border ${isLast?'bg-emerald-100 text-emerald-700 border-emerald-200':currentStep>=7?'bg-violet-100 text-violet-700 border-violet-200':'bg-amber-100 text-amber-700 border-amber-200'}`;
  document.getElementById('btn-prev').disabled = currentStep===1;
  const hint = document.getElementById('next-hint');
  if (s.nextLabel && !isLast) { hint.textContent = `다음: ${s.nextLabel}`; hint.classList.remove('hidden'); }
  else hint.classList.add('hidden');
  document.getElementById('btn-approve-text').textContent = isLast ? '분석 완료 · 새 주차 시작' : `${s.nextLabel||'다음'} →`;
  document.getElementById('progress-label').textContent = `${currentStep} / 8 완료`;
  document.getElementById('progress-bar').style.width = `${(currentStep/8)*100}%`;
  const btnReject = document.getElementById('btn-reject');
  if(currentStep>=3 && currentStep<=6) btnReject.classList.remove('hidden');
  else btnReject.classList.add('hidden');
}

function renderWorkspace() {
  const ws = document.getElementById('workspace');
  ws.innerHTML = `<div class="fade-in h-full">${RENDERERS[currentStep]()}</div>`;
  lucide.createIcons();
  renderSidebar();
  renderHeader();
}

window.goStep = function(id) {
  currentStep = id;
  renderWorkspace();
};

document.getElementById('btn-approve').addEventListener('click', ()=>{
  if(currentStep < 8) { currentStep++; renderWorkspace(); toast(`Step ${currentStep}로 이동했습니다.`); }
  else toast('모든 단계 완료! 새 주차 콘텐츠 기획을 시작합니다. 🎉');
});
document.getElementById('btn-prev').addEventListener('click', ()=>{
  if(currentStep > 1) { currentStep--; renderWorkspace(); }
});
document.getElementById('btn-reject').addEventListener('click', ()=>{
  toast('재작업을 요청했습니다. AI가 재생성합니다.', 'err');
});

// Init
renderWorkspace();
</script>
</body>
</html>
